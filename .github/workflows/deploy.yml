name: Deployment
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  MONGODB_DB_NAME: mongodb
jobs:
  test:
    env:
      MONGODB_CLUSTER_ADDRESS: 'mongodb+srv://<db_username>:<db_password>@cluster0.ln03kk5.mongodb.net/?appName=Cluster0'
      MONGODB_USERNAME: testcicd
      MONGODB_PASSWORD: RUJeeZFDd3JyUVBK
      PORT: 8080
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm install
        
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
        # value showing from repo environment secre
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
          echo "MONGODB_DBNAME: ${{ env.MONGODB_DB_NAME }}"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
          echo "MONGODB_DBNAME: ${{ env.MONGODB_DB_NAME }}"
          echo "MONGODB_PASSWORD: ${{ env.MONGODB_PASSWORD }}"
